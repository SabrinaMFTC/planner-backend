services:
  postgres:
    image: postgres:16
    container_name: planner-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: planner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - planner-net

  app:
    build: .
    container_name: planner-backend
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    networks:
      - planner-net

volumes:
  postgres_data:

networks:
  planner-net:
    driver: bridge